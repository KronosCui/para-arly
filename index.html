<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, orientation=any">
  <title>Veo en ti la luz • Para Arly</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b1a2f;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      margin: 0;
    }
    .card {
      background: #1e2f45;
      border-radius: 32px;
      width: 100%;
      max-width: 520px;
      padding: 20px 18px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,215,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    /* En horizontal, se reparte mejor el espacio */
    @media (orientation: landscape) and (max-height: 500px) {
      .card {
        flex-direction: row;
        max-width: 800px;
        padding: 16px;
      }
      .video-container {
        flex: 1;
      }
      .right-col {
        flex: 0 0 45%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
    }
    h2 {
      color: #f7e05e;
      text-align: center;
      font-weight: 500;
      font-size: 1.7rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h2 span {
      background: #f7e05e20;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 1.2rem;
      color: #ffd966;
    }
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      background: #000;
    }
    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .lyrics-panel {
      background: #0f1e2f;
      border-radius: 24px;
      padding: 20px 14px;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.35);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }
    /* Fondo animado sutil */
    .lyrics-panel::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(247,224,94,0.08), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(212,148,43,0.08), transparent 60%);
      animation: rotateGradient 12s linear infinite;
      z-index: 0;
    }
    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .lyric-line {
      font-size: 1.35rem;
      font-weight: 500;
      color: #f0e6c5;
      line-height: 1.5;
      padding: 6px 12px;
      border-radius: 14px;
      position: relative;
      z-index: 1;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .lyric-line.animate-pop {
      animation: popIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.93); filter: blur(2px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .highlight {
      color: #ffffff;
      text-shadow: 0 0 12px #f7e05e;
      background: rgba(255,215,0,0.12);
    }
    .message-to-arly {
      background: linear-gradient(135deg, #4a2c2c, #7a3e3e);
      color: #ffe5b4;
      font-weight: 700;
      font-size: 1.5rem;
      border: 2px solid #e6b422;
      text-shadow: 0 0 8px #ffb347;
      letter-spacing: 0.5px;
      animation: gentlePulse 1.4s infinite;
    }
    @keyframes gentlePulse {
      0% { box-shadow: 0 0 8px #e6b422; }
      50% { box-shadow: 0 0 20px #f7e05e, 0 0 30px #d4942b; }
      100% { box-shadow: 0 0 8px #e6b422; }
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      color: #a0b9ce;
      font-size: 0.8rem;
      padding: 0 6px;
      margin-top: 2px;
    }
    .footer-note {
      color: #8aa0b5;
      text-align: center;
      font-size: 0.8rem;
      margin-top: 6px;
    }
    button {
      background: #f7e05e;
      border: none;
      color: #0b1a2f;
      font-weight: bold;
      padding: 12px 22px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      box-shadow: 0 4px 12px rgba(247,224,94,0.3);
    }
    button:hover {
      background: #ffd966;
      transform: translateY(-2px);
    }
    /* Ajustes para pantallas muy pequeñas */
    @media (max-width: 380px) {
      .lyric-line {
        font-size: 1.2rem;
      }
      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
<div class="card">
  <h2>
    ✦ Veo en ti la luz ✦
    <span>para Arly</span>
  </h2>

  <!-- Reproductor de YouTube -->
  <div class="video-container">
    <div id="player"></div>
  </div>

  <!-- Envoltorio para la columna derecha en horizontal -->
  <div class="right-col">
    <div class="lyrics-panel" id="lyricsContainer">
      <div class="lyric-line" id="currentLyric">🎵 Presiona play, Arly 🎵</div>
    </div>

    <div class="progress-info">
      <span id="timeDisplay">00:00</span>
      <span id="statusDisplay">⏸️</span>
    </div>

    <div style="display: flex; justify-content: center;">
      <button id="playHintButton">▶️ Iniciar música</button>
    </div>
    <div class="footer-note">
      Hecho con amor para Arly ✨
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN ==========
  const YOUTUBE_VIDEO_ID = 'fZSZMp32XaA';

  // ⚙️ AJUSTE DE SINCRONIZACIÓN:
  // Si la letra aparece uno o dos segundos TARDE, pon un número NEGATIVO (ej: -2.0)
  // Si aparece ADELANTADA, pon un número POSITIVO.
  // Pruébalo y modifica este valor hasta que encaje perfecto.
  const TIME_OFFSET = -2.0; // ← ¡Ajusta esto!

  // ========== LÍNEAS DE TIEMPO (LETRA + MENSAJES) ==========
  const timeline = [
    { time: 10.5, text: "Tiempo aquel viendo a la distancia", type: "lyric" },
    { time: 15.2, text: "Tiempo fue viendo al interior", type: "lyric" },
    { time: 20.0, text: "Tiempo que no me imaginaba", type: "lyric" },
    { time: 24.8, text: "Lo que me perdí", type: "lyric" },
    { time: 29.0, text: "Y hoy aquí, viendo las estrellas", type: "lyric" },
    { time: 33.5, text: "Y hoy aquí, todo es claridad", type: "lyric" },
    { time: 38.2, text: "Desde aquí, ya puedo ver", type: "lyric" },
    { time: 42.9, text: "Que es donde debo estar", type: "lyric" },

    { time: 47.2, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 51.9, text: "Se aclaró aquella niebla", type: "lyric" },
    { time: 56.6, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 61.3, text: "Ahora el cielo es azul", type: "lyric" },
    { time: 65.8, text: "Es real brillando así", type: "lyric" },
    { time: 70.4, text: "Ya cambió la vida entera", type: "lyric" },
    { time: 75.0, text: "Esta vez todo es diferente", type: "lyric" },
    { time: 79.8, text: "Veo en ti la luz", type: "lyric" },

    // ---- MENSAJE PARA ARLY ----
    { time: 84.5, text: "💖 Arly, tú eres esa luz 💖", type: "message" },

    { time: 90.0, text: "Tiempo aquel persiguiendo un sueño", type: "lyric" },
    { time: 94.5, text: "Tiempo fue en la oscuridad", type: "lyric" },
    { time: 99.2, text: "Tiempo que no había visto", type: "lyric" },
    { time: 104.0, text: "Cómo es la realidad", type: "lyric" },
    { time: 108.6, text: "Ella aquí luce como estrella", type: "lyric" },
    { time: 113.3, text: "Ella aquí, todo es claridad", type: "lyric" },
    { time: 118.0, text: "Si aquí está, es fácil ver", type: "lyric" },
    { time: 122.7, text: "Que aquí hoy quiero estar", type: "lyric" },

    { time: 127.4, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 132.1, text: "Se aclaró aquella niebla", type: "lyric" },
    { time: 136.8, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 141.5, text: "Ahora el cielo es azul", type: "lyric" },
    { time: 146.2, text: "Es real brillando así", type: "lyric" },
    { time: 150.8, text: "Ya cambió la vida entera", type: "lyric" },
    { time: 155.4, text: "Esta vez todo es diferente", type: "lyric" },
    { time: 160.0, text: "Veo en ti la luz", type: "lyric" },

    // ---- MENSAJE FINAL PARA ARLY ----
    { time: 167.0, text: "✨ Gracias por iluminar mi vida, Arly ✨", type: "message" },

    { time: 175.0, text: "Veo en ti la luz", type: "lyric" }
  ];

  // ========== REPRODUCTOR DE YOUTUBE ==========
  let player;
  let previousText = '';
  let lyricsContainer = document.getElementById('currentLyric');
  let timeDisplay = document.getElementById('timeDisplay');
  let statusDisplay = document.getElementById('statusDisplay');
  let playHintButton = document.getElementById('playHintButton');

  // Cargar la API de YouTube
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: YOUTUBE_VIDEO_ID,
      playerVars: {
        autoplay: 0,
        controls: 1,
        modestbranding: 1,
        rel: 0,
        fs: 1,
        playsinline: 1
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(event) {
    statusDisplay.textContent = '🎬 Listo';
    playHintButton.addEventListener('click', () => {
      player.playVideo();
    });
  }

  let syncInterval = null;
  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      statusDisplay.textContent = '▶️';
      if (syncInterval) clearInterval(syncInterval);
      syncInterval = setInterval(updateLyricSync, 150);
    } else if (event.data === YT.PlayerState.PAUSED) {
      statusDisplay.textContent = '⏸️';
      if (syncInterval) clearInterval(syncInterval);
    } else if (event.data === YT.PlayerState.ENDED) {
      statusDisplay.textContent = '🏁';
      if (syncInterval) clearInterval(syncInterval);
      setLyric('🎶 Canción terminada. ¡Te amo, Arly! 🎶', 'message-to-arly');
    }
  }

  function setLyric(text, type) {
    if (previousText === text) return; // Evita animar el mismo texto repetidamente
    lyricsContainer.textContent = text;
    // Limpia clases anteriores y aplica la nueva
    lyricsContainer.className = 'lyric-line';
    if (type === 'message') {
      lyricsContainer.classList.add('message-to-arly');
    } else {
      lyricsContainer.classList.add('highlight');
    }
    // Dispara la animación
    void lyricsContainer.offsetWidth; // reflow
    lyricsContainer.classList.add('animate-pop');
    previousText = text;
  }

  function updateLyricSync() {
    if (!player || !player.getCurrentTime) return;
    const currentTime = player.getCurrentTime() + TIME_OFFSET; // ← Corrección aplicada
    timeDisplay.textContent = formatTime(player.getCurrentTime()); // Muestra el tiempo real del video

    let activeEntry = null;
    for (let i = timeline.length - 1; i >= 0; i--) {
      if (currentTime >= timeline[i].time) {
        activeEntry = timeline[i];
        break;
      }
    }

    if (activeEntry) {
      setLyric(activeEntry.text, activeEntry.type);
    } else {
      setLyric('🎵 Presiona play, Arly 🎵', '');
    }
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }

  window.addEventListener('beforeunload', () => {
    if (syncInterval) clearInterval(syncInterval);
  });
</script>
</body>
</html>
