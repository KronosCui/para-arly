<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, orientation=portrait">
  <title>Veo en ti la luz • Para Arly</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b1a2f;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* ======== ANIMACIONES FLOTANTES (CORAZONES, FAROLES, ESTRELLAS) ======== */
    .floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .floating-item {
      position: absolute;
      bottom: -60px;
      opacity: 0;
      animation: floatUp 8s infinite;
      font-size: 1.8rem;
      color: #f7e05e;
      text-shadow: 0 0 12px #ffb347;
    }
    .floating-item.heart {
      color: #ff6b81;
      text-shadow: 0 0 15px #ff3366;
    }
    .floating-item.star {
      color: #ffd966;
      text-shadow: 0 0 18px #f0a500;
    }
    .floating-item.lantern {
      font-size: 2.2rem;
      color: #e6b422;
      text-shadow: 0 0 20px #d4942b, 0 0 30px #b36b1e;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.5) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      50% {
        opacity: 0.7;
      }
      90% {
        opacity: 0.2;
      }
      100% {
        transform: translateY(-110vh) scale(1.2) rotate(30deg);
        opacity: 0;
      }
    }

    /* Distribución de elementos flotantes */
    .item1 { left: 5%; animation-delay: 0s; }
    .item2 { left: 15%; animation-delay: 1.5s; }
    .item3 { left: 25%; animation-delay: 3s; }
    .item4 { left: 35%; animation-delay: 4.5s; }
    .item5 { left: 45%; animation-delay: 6s; }
    .item6 { left: 55%; animation-delay: 2s; }
    .item7 { left: 65%; animation-delay: 5s; }
    .item8 { left: 75%; animation-delay: 0.8s; }
    .item9 { left: 85%; animation-delay: 2.7s; }
    .item10 { left: 95%; animation-delay: 4s; }

    .card {
      background: #1e2f45;
      border-radius: 32px;
      width: 100%;
      max-width: 500px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,215,0,0.25);
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }
    h2 {
      color: #f7e05e;
      text-align: center;
      font-weight: 500;
      font-size: 1.7rem;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h2 span {
      background: #f7e05e20;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 1.2rem;
      color: #ffd966;
    }
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      background: #000;
    }
    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .lyrics-panel {
      background: #0f1e2f;
      border-radius: 24px;
      padding: 20px 14px;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.35);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    /* Fondo animado sutil */
    .lyrics-panel::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(247,224,94,0.08), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(212,148,43,0.08), transparent 60%);
      animation: rotateGradient 12s linear infinite;
      z-index: 0;
    }
    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .lyric-line {
      font-size: 1.35rem;
      font-weight: 500;
      color: #f0e6c5;
      line-height: 1.5;
      padding: 6px 12px;
      border-radius: 14px;
      position: relative;
      z-index: 1;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .lyric-line.animate-pop {
      animation: popIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.93); filter: blur(2px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .highlight {
      color: #ffffff;
      text-shadow: 0 0 12px #f7e05e;
      background: rgba(255,215,0,0.12);
    }
    .message-to-arly {
      background: linear-gradient(135deg, #4a2c2c, #7a3e3e);
      color: #ffe5b4;
      font-weight: 700;
      font-size: 1.5rem;
      border: 2px solid #e6b422;
      text-shadow: 0 0 8px #ffb347;
      letter-spacing: 0.5px;
      animation: gentlePulse 1.4s infinite;
    }
    @keyframes gentlePulse {
      0% { box-shadow: 0 0 8px #e6b422; }
      50% { box-shadow: 0 0 20px #f7e05e, 0 0 30px #d4942b; }
      100% { box-shadow: 0 0 8px #e6b422; }
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      color: #a0b9ce;
      font-size: 0.8rem;
      padding: 0 6px;
      margin-top: 2px;
    }
    .footer-note {
      color: #8aa0b5;
      text-align: center;
      font-size: 0.8rem;
      margin-top: 6px;
    }
    button {
      background: #f7e05e;
      border: none;
      color: #0b1a2f;
      font-weight: bold;
      padding: 12px 22px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      box-shadow: 0 4px 12px rgba(247,224,94,0.3);
    }
    button:hover {
      background: #ffd966;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<!-- Elementos flotantes decorativos (fuera del cuadro del video) -->
<div class="floating-container">
  <span class="floating-item heart item1">❤️</span>
  <span class="floating-item star item2">✨</span>
  <span class="floating-item lantern item3">🏮</span>
  <span class="floating-item heart item4">💖</span>
  <span class="floating-item star item5">🌟</span>
  <span class="floating-item lantern item6">🏮</span>
  <span class="floating-item heart item7">💕</span>
  <span class="floating-item star item8">⭐</span>
  <span class="floating-item lantern item9">🏮</span>
  <span class="floating-item heart item10">❤️‍🔥</span>
</div>

<div class="card">
  <h2>
    ✦ Veo en ti la luz ✦
    <span>para Arly</span>
  </h2>

  <div class="video-container">
    <div id="player"></div>
  </div>

  <div class="lyrics-panel" id="lyricsContainer">
    <div class="lyric-line" id="currentLyric">🎵 Presiona play, Arly 🎵</div>
  </div>

  <div class="progress-info">
    <span id="timeDisplay">00:00</span>
    <span id="statusDisplay">⏸️</span>
  </div>

  <div style="display: flex; justify-content: center;">
    <button id="playHintButton">▶️ Iniciar música</button>
  </div>
  <div class="footer-note">
    Hecho con amor para Arly ✨
  </div>
</div>

<script>
  // ========== CONFIGURACIÓN ==========
  const YOUTUBE_VIDEO_ID = 'fZSZMp32XaA';

  // Ahora la letra se adelanta solo 0.6 segundos
  const TIME_OFFSET = -0.6; 

  // ========== LÍNEAS DE TIEMPO (LETRA + MENSAJES) ==========
  const timeline = [
    { time: 10.5, text: "Tiempo aquel viendo a la distancia", type: "lyric" },
    { time: 15.2, text: "Tiempo fue viendo al interior", type: "lyric" },
    { time: 20.0, text: "Tiempo que no me imaginaba", type: "lyric" },
    { time: 24.8, text: "Lo que me perdí", type: "lyric" },
    { time: 29.0, text: "Y hoy aquí, viendo las estrellas", type: "lyric" },
    { time: 33.5, text: "Y hoy aquí, todo es claridad", type: "lyric" },
    { time: 38.2, text: "Desde aquí, ya puedo ver", type: "lyric" },
    { time: 42.9, text: "Que es donde debo estar", type: "lyric" },

    { time: 47.2, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 51.9, text: "Se aclaró aquella niebla", type: "lyric" },
    { time: 56.6, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 61.3, text: "Ahora el cielo es azul", type: "lyric" },
    { time: 65.8, text: "Es real brillando así", type: "lyric" },
    { time: 70.4, text: "Ya cambió la vida entera", type: "lyric" },
    { time: 75.0, text: "Esta vez todo es diferente", type: "lyric" },
    { time: 79.8, text: "Veo en ti la luz", type: "lyric" },

    // ---- MENSAJES PARA ARLY (del 87 al 100) ----
    { time: 87.0, text: "💖 Arly, tú eres esa luz 💖", type: "message" },
    { time: 93.0, text: "🌹 Y cada día a tu lado es mágico 🌹", type: "message" },
    { time: 100.0, text: "✨ No hay sueño más bonito que tú ✨", type: "message" },

    // La canción sigue desde aquí (segundo 110)
    { time: 110.0, text: "Ella aquí luce como estrella", type: "lyric" },
    { time: 113.3, text: "Ella aquí, todo es claridad", type: "lyric" },
    { time: 118.0, text: "Si aquí está, es fácil ver", type: "lyric" },
    { time: 122.7, text: "Que aquí hoy quiero estar", type: "lyric" },

    { time: 127.4, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 132.1, text: "Se aclaró aquella niebla", type: "lyric" },
    { time: 136.8, text: "Y la luz encuentro al fin", type: "lyric" },
    { time: 141.5, text: "Ahora el cielo es azul", type: "lyric" },
    { time: 146.2, text: "Es real brillando así", type: "lyric" },
    { time: 150.8, text: "Ya cambió la vida entera", type: "lyric" },
    { time: 155.4, text: "Esta vez todo es diferente", type: "lyric" },
    { time: 160.0, text: "Veo en ti la luz", type: "lyric" },

    // ---- MENSAJE FINAL PARA ARLY ----
    { time: 167.0, text: "✨ Gracias por iluminar mi vida, Arly ✨", type: "message" },

    { time: 175.0, text: "Veo en ti la luz", type: "lyric" }
  ];

  // ========== REPRODUCTOR DE YOUTUBE ==========
  let player;
  let previousText = '';
  let lyricsContainer = document.getElementById('currentLyric');
  let timeDisplay = document.getElementById('timeDisplay');
  let statusDisplay = document.getElementById('statusDisplay');
  let playHintButton = document.getElementById('playHintButton');

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: YOUTUBE_VIDEO_ID,
      playerVars: {
        autoplay: 0,
        controls: 1,
        modestbranding: 1,
        rel: 0,
        fs: 1,
        playsinline: 1
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(event) {
    statusDisplay.textContent = '🎬 Listo';
    playHintButton.addEventListener('click', () => {
      player.playVideo();
    });
  }

  let syncInterval = null;
  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      statusDisplay.textContent = '▶️';
      if (syncInterval) clearInterval(syncInterval);
      syncInterval = setInterval(updateLyricSync, 150);
    } else if (event.data === YT.PlayerState.PAUSED) {
      statusDisplay.textContent = '⏸️';
      if (syncInterval) clearInterval(syncInterval);
    } else if (event.data === YT.PlayerState.ENDED) {
      statusDisplay.textContent = '🏁';
      if (syncInterval) clearInterval(syncInterval);
      setLyric('🎶 Canción terminada. ¡Te amo, Arly! 🎶', 'message-to-arly');
    }
  }

  function setLyric(text, type) {
    if (previousText === text) return;
    lyricsContainer.textContent = text;
    lyricsContainer.className = 'lyric-line';
    if (type === 'message') {
      lyricsContainer.classList.add('message-to-arly');
    } else {
      lyricsContainer.classList.add('highlight');
    }
    void lyricsContainer.offsetWidth;
    lyricsContainer.classList.add('animate-pop');
    previousText = text;
  }

  function updateLyricSync() {
    if (!player || !player.getCurrentTime) return;
    const currentTime = player.getCurrentTime() + TIME_OFFSET;
    timeDisplay.textContent = formatTime(player.getCurrentTime());

    let activeEntry = null;
    for (let i = timeline.length - 1; i >= 0; i--) {
      if (currentTime >= timeline[i].time) {
        activeEntry = timeline[i];
        break;
      }
    }

    if (activeEntry) {
      setLyric(activeEntry.text, activeEntry.type);
    } else {
      setLyric('🎵 Presiona play, Arly 🎵', '');
    }
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }

  window.addEventListener('beforeunload', () => {
    if (syncInterval) clearInterval(syncInterval);
  });
</script>
</body>
</html>
